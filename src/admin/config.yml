backend:
  name: github
  repo: xtradmk/interesting-america-hp
  branch: main
  base_url: https://ia-cms-oauth.davidmauricekoelle.workers.dev
  auth_endpoint: auth

site_url: "https://xtradmk.github.io/interesting-america-hp/"
display_url: "https://xtradmk.github.io/interesting-america-hp/"
logo_url: "/interesting-america-hp/images/logo.svg"

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home"
        name: "home"
        file: "src/index.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Hero Dimming (%)", name: "hero_dimming_percent", widget: "number", min: 0, max: 100, step: 1, default: 100 }
          - { label: "Hero Image 1", name: "hero_image1", widget: "image" }
          - { label: "Hero Caption 1", name: "hero_caption1", widget: "string" }
          - { label: "Hero Image 2", name: "hero_image2", widget: "image" }
          - { label: "Hero Caption 2", name: "hero_caption2", widget: "string" }
          - { label: "Hero Image 3", name: "hero_image3", widget: "image" }
          - { label: "Hero Caption 3", name: "hero_caption3", widget: "string" }
          - { label: "Hero Image 4", name: "hero_image4", widget: "image" }
          - { label: "Hero Caption 4", name: "hero_caption4", widget: "string" }
          - { label: "Hero Image 5", name: "hero_image5", widget: "image" }
          - { label: "Hero Caption 5", name: "hero_caption5", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "About"
        name: "about"
        file: "src/about.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Services"
        name: "services"
        file: "src/services.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "src/contact.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Global Settings"
    files:
      - label: "Site"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "URL", name: "url", widget: "string" }
          - { label: "Author", name: "author", widget: "string" }
          - { label: "Logo", name: "logo", widget: "string", required: false }
          - label: "Navigation"
            name: "nav"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
